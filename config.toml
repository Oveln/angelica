[llm]
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com"
max_tokens = 4096
temperature = 0.7
thinking = true
reasoning_effort = "high"
max_iterations = 15
# role_immersion = true    # true = 强制开启, false = 强制关闭, 不设置 = 自动检测

# Named profiles — unset fields inherit from [llm] above.
# [llm.profiles.fast]
# model = "deepseek-v4-flash"
# temperature = 0.3
# thinking = false
# max_tokens = 2048

[memory]
memory_path = "data/MEMORY.md"
profile_path = "data/profile.md"
soul_path = "data/SOUL.md"
notebook_path = "data/notebook.md"
max_file_size_kb = 32

[skills]
directory = "skills"

[state]
path = "data/state.json"
conversation_path = "data/conversation.jsonl"
archive_dir = "data/archive"
snapshots_dir = "data/snapshots"
max_snapshots = 20

[fatigue]
reference_context_window = 64000
per_turn_base = 0.015
per_tool_call_ratio = 0.333
sleep_threshold = 1.0
can_sleep_threshold = 0.8
groggy_turns = 3

# Example MCP server configs:
# [mcp.servers.filesystem]
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
