# Angelica Configuration
# Copy to ~/.config/angelica/config.toml and edit as needed.
# Data files live in ~/.local/share/angelica/ by default.
#
# Config search order:
#   1. --config <path>    (CLI flag)
#   2. ~/.config/angelica/config.toml
#   3. built-in defaults (no file needed)

[llm]
default_provider = "deepseek"
max_iterations = 15

[[llm.providers]]
name = "deepseek"
adapter = "DeepSeek"
model = "deepseek-v4-flash"

[fatigue]
max_context_tokens = 80000

[permission]
default = "ask"
