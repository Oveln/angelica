[llm]
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com"
max_tokens = 4096
temperature = 0.7
thinking = true
reasoning_effort = "high"
max_iterations = 15

[memory]
episodes_path = "data/episodes.jsonl"
self_path = "data/SELF.md"
profiles_dir = "data/profiles"
notebook_path = "data/notebook.md"
recent_threshold = 5
episode_inject_budget = 2
recall_similarity_threshold = 0.6
recall_inject_threshold = 0.7
recall_inject_probability = 0.6
self_hard_limit = 8192
profile_hard_limit = 8192

[embedding]
provider = "ollama"
model = "qwen3-embedding"
base_url = "http://localhost:11434"

[skills]
directory = "skills"

[state]
path = "data/state.json"
conversation_path = "data/conversation.jsonl"
archive_dir = "data/archive"
snapshots_dir = "data/snapshots"
max_snapshots = 20

[fatigue]
reference_context_window = 64000
per_turn_base = 0.015
per_tool_call_ratio = 0.333
sleep_threshold = 1.0
can_sleep_threshold = 0.8
groggy_turns = 3
