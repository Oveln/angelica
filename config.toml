# Angelica Configuration
# All paths are relative to the config file's parent directory.

[llm]
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com"
# api_key = ""                    # or set DEEPSEEK_API_KEY / OPENAI_API_KEY env
max_tokens = 4096
temperature = 0.7
thinking = true
reasoning_effort = "high"        # low, medium, high
max_iterations = 15

[memory]
episodes_path = "data/episodes.jsonl"
self_path = "data/SELF.md"
profiles_dir = "data/profiles"
notebook_path = "data/notebook.md"
recent_threshold = 5             # max recent episodes in system prompt
episode_inject_budget = 2        # max recalled past episodes per turn
recall_similarity_threshold = 0.6
recall_inject_threshold = 0.7    # min score to consider injecting recall
recall_inject_probability = 0.6  # chance of injecting when threshold met
self_hard_limit = 8192           # chars; triggers compression on sleep
profile_hard_limit = 8192

[embedding]
provider = "ollama"              # currently only ollama supported
model = "qwen3-embedding"
base_url = "http://localhost:11434"

[skills]
directory = "skills"

[state]
path = "data/state.json"
conversation_path = "data/conversation.jsonl"

[permission]
default = "ask"                  # ask, allow, deny
# approved_path = "data/approved_rules.toml"
# Per-tool overrides:
# [[permission.tools]]
# tool = "read_file"
# target = "*"
# action = "allow"

[fatigue]
max_context_tokens = 80000
curve_exponent = 1.0
sleep_threshold = 0.85
can_sleep_threshold = 0.6
groggy_turns = 3
